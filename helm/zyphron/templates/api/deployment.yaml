apiVersion: apps/v1
kind: Deployment
metadata:
  name: zyphron-api
  namespace: zyphron-system
  labels:
    {{- include "zyphron.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: zyphron-api
  template:
    metadata:
      labels:
        app: zyphron-api
        {{- include "zyphron.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.api.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: zyphron-api
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: zyphron-api-config
            - secretRef:
                name: zyphron-api-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:$(PG_PASSWORD)@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
            {{- if .Values.kafka.enabled }}
            - name: KAFKA_BROKERS
              value: "{{ .Release.Name }}-kafka:9092"
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
