apiVersion: v1
kind: Secret
metadata:
  name: zyphron-api-secrets
  namespace: zyphron-system
  labels:
    {{- include "zyphron.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.api.secrets.JWT_SECRET | default (randAlphaNum 64) | quote }}
  RESEND_API_KEY: {{ .Values.api.secrets.RESEND_API_KEY | default "" | quote }}
  GROQ_API_KEYS: {{ .Values.api.secrets.GROQ_API_KEYS | default "" | quote }}
  PG_PASSWORD: {{ .Values.postgresql.auth.password | default (randAlphaNum 32) | quote }}
  {{- range $k, $v := .Values.api.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
