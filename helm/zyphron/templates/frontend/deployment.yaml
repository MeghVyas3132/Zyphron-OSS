apiVersion: apps/v1
kind: Deployment
metadata:
  name: zyphron-frontend
  namespace: zyphron-system
  labels:
    {{- include "zyphron.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: zyphron-frontend
  template:
    metadata:
      labels:
        app: zyphron-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: "http://zyphron-api.zyphron-system.svc.cluster.local"
            - name: NEXT_PUBLIC_APP_URL
              value: "https://app.{{ .Values.global.domain }}"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.{{ .Values.global.domain }}"
            # Grafana embedded — proxied via /grafana
            - name: NEXT_PUBLIC_GRAFANA_URL
              value: "https://app.{{ .Values.global.domain }}/grafana"
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: "/", port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zyphron-frontend
  namespace: zyphron-system
  labels:
    {{- include "zyphron.labels" . | nindent 4 }}
spec:
  selector:
    app: zyphron-frontend
  ports:
    - port: 80
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zyphron-frontend
  namespace: zyphron-system
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: "app.{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zyphron-frontend
                port: { number: 80 }
          # Proxy /grafana to Grafana service (iframe embed)
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: "{{ .Release.Name }}-grafana"
                port: { number: 80 }
